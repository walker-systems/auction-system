name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build Java Applications (On GitHub Servers!)
        run: mvn clean package

      - name: Copy Pre-built files to Droplet via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "compose.yml,prometheus.yml,bidding-engine/Dockerfile,sentinel-service/Dockerfile,sentinel-ml/,bidding-engine/target/bidding-engine-0.0.1-SNAPSHOT.jar,sentinel-service/target/sentinel-service-0.0.1-SNAPSHOT.jar"
          target: "/root/auction-system"

      - name: Restart Docker Compose on Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            # 1. Install Docker if it doesn't exist on this fresh Droplet
            if ! command -v docker &> /dev/null; then
                echo "Docker not found. Installing..."
                curl -fsSL https://get.docker.com | sh
            fi
            
            # 2. Spin up the infrastructure
            cd /root/auction-system
            docker compose down || true
            docker compose up --build -d

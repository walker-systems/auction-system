spring:
  application:
    name: bidding-engine
  docker:
    compose:
      file: ../docker-compose.yml

  # 1. Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  # 2. AI / OpenAI Configuration
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-3.5-turbo

  # 3. WebFlux Config
  main:
    web-application-type: reactive

# 4. Logging
logging:
  level:
    root: INFO
    com.walker.bidding: DEBUG
    org.springframework.data.redis: INFO

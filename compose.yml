services:
  redis:
    image: redis:7.2-alpine
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - bidstream-net
    command: redis-server --appendonly yes --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  sentinel-ml:
    build:
      context: ./sentinel-ml
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - bidstream-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  sentinel-service:
    build:
      context: .
      dockerfile: sentinel-service/Dockerfile
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - ML_SERVICE_URL=http://sentinel-ml:8000
      - JAVA_TOOL_OPTIONS=-Xmx256m -Xms256m
    networks:
      - bidstream-net
    depends_on:
      redis:
        condition: service_healthy
      sentinel-ml:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  bidding-engine:
    build:
      context: .
      dockerfile: bidding-engine/Dockerfile
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - JAVA_TOOL_OPTIONS=-Xmx256m -Xms256m
    networks:
      - bidstream-net
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - bidstream-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - bidstream-net
    depends_on:
      - prometheus

networks:
  bidstream-net:
    driver: bridge

volumes:
  grafana-data:
  prometheus-data:
